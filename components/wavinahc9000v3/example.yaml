esphome:
  name: wavinahc9000v3
  friendly_name: wavinahc9000v3

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  - source:
      type: git
      url: https://github.com/heinekmadsen/esphome_components
      ref: "v1.0.1"
      #ref: "main"
      #ref: "develop"
    components: [wavinahc9000v3]
    refresh: 0s

logger:
  level: DEBUG
  logs:
    wavinahc9000v3: DEBUG

api:
  services:
    - service: dump_wavin_yaml
      then:
        - lambda: 'id(wavin).generate_yaml_suggestion();'

uart:
  id: uart_wavin
  # Prefer stable UART pins (e.g. 16/17) to avoid strapping pin issues
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 38400
  stop_bits: 1
  parity: NONE

wavinahc9000v3:
  id: wavin
  uart_id: uart_wavin
  # flow_control_pin: GPIO3 # Optional: enable if using uStepper modbus module
  # Regular polling interval; optionally lower temporarily for quicker discovery
  update_interval: 5s
  # keep_standby_alive: true          # disabled by default; enable to reassert OFF periodically
  # standby_keepalive_interval: 180s  # optional override (default 180s, controller drifts after ~4-5 min)
  # Optional: speed up initial discovery (uncomment briefly)
  # poll_channels_per_cycle: 8
  # update_interval: 2s
  # allow_mode_writes: false  # uncomment to make climates read-only (defaults to true)
  # Optional per-channel friendly names used in the logged YAML suggestion output
  # Provide any subset (1..16). Missing entries fallback to "Zone N".
  channel_01_friendly_name: "Bedroom"
  channel_02_friendly_name: "Living Room"
  channel_03_friendly_name: "Kitchen"
  # channel_04_friendly_name: "Office"
  # ... add more as needed up to channel_16_friendly_name

climate:
  # Single channel climate using channel 1 (friendly name -> Bedroom)
  - platform: wavinahc9000v3
    wavinahc9000v3_id: wavin
    name: "Bedroom"
    channel: 1
  # Group climate combining channels 2 & 3. Since both have friendly names,
  # the generated group suggestion will use "Living Room & Kitchen".
  - platform: wavinahc9000v3
    wavinahc9000v3_id: wavin
    name: "Living Area"  # You can override; suggestion would be auto-composed
    members: [2,3]

sensor:
  - platform: wavinahc9000v3
    wavinahc9000v3_id: wavin
    name: "Bedroom Battery"
    channel: 1
    type: battery
  - platform: wavinahc9000v3
    wavinahc9000v3_id: wavin
    name: "Bedroom Temperature"
    channel: 1
    type: temperature

wifi:
  ssid: "<your-ssid>"
  password: "<your-password>"

ota:
