# ----------- Sensor ----------- #
sensor:
  - platform:               modbus_controller
    name:                   ${name} Comfort Temperature ${channel_13_friendly_name}
    id:                     ${device}_comfort_temp_${channel_13_id}
    modbus_controller_id:   ${device}_modbus_controller
    custom_command: 
      - 0x01
      - 0x43
      - 0x01
      - 0x05 # 05 = Floor temp
      - $channel_13
      - 0x01
    value_type: U_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    lambda: |-
      if (data.size() < 4) {
        ESP_LOGW("wavinahc9000v2", "Comfort temp response too short (%d bytes)", data.size());
        return NAN;
      }
      uint16_t raw_temp = (data[2] << 8) | data[3];
      float temp_c = raw_temp * 0.1f;
      if (temp_c < 1.0f || temp_c > 90.0f) {
        ESP_LOGW("wavinahc9000v2", "Comfort temp out of range: %.1f C (raw=%d), ignoring", temp_c, raw_temp);
        return NAN;
      }
      return temp_c;

# ----------- Number ----------- #
number:
  - platform:               modbus_controller
    name:                   ${name} Comfort Target Temperature ${channel_13_friendly_name}
    id:                     ${device}_comfort_target_temp_${channel_13_id}
    modbus_controller_id:   ${device}_modbus_controller
    internal: true
    custom_command: 
      - 0x01
      - 0x43
      - 0x02
      - 0x01 # 01 = comfort
      - $channel_13
      - 0x01
    value_type: U_WORD
    unit_of_measurement: "°C"
    min_value: 6
    max_value: 40
    step: .5
    write_lambda: |-
      ESP_LOGD("main", "Trying to write new target temp: %f",x);
      uint16_t targettemp = x * 10;
      payload.push_back(0x0144);
      payload.push_back(0x0201);  // 01 = comfort
      payload.push_back(${channel_13}01);
      payload.push_back(targettemp);
      return true;
    lambda: |-
      float temp_c = x * 0.1f;
      if (temp_c < 1.0f || temp_c > 90.0f) return NAN;
      return temp_c;

# ----------- Switch ----------- #
switch:
  - platform:               modbus_controller
    name:                   ${name} Comfort Standby ${channel_13_friendly_name}
    id:                     ${device}_comfort_standby_${channel_13_id}
    modbus_controller_id:   ${device}_modbus_controller
    custom_command:
      - 0x01
      - 0x43
      - 0x02
      - 0x07
      - $channel_13
      - 0x03
    write_lambda: |-
      ESP_LOGD("main","Modbus Switch incoming state for channel 13 = %s",ONOFF(x));
      uint8_t MODE_MASK = 0x07;
      payload.push_back(0x01);
      payload.push_back(0x45);
      payload.push_back(0x02);
      payload.push_back(0x07); 
      payload.push_back(${channel_13});       
      payload.push_back(0x03); 
      if(x)
      {
        ESP_LOGD("main","Pushing back 0x01 because state is %s",ONOFF(x));
        payload.push_back( 0x01 >> 8);
        payload.push_back( 0x01 & 0xFF);
      }
      else
      {
        ESP_LOGD("main","Pushing back 0x00 because state is %s",ONOFF(x));
        payload.push_back( 0x00 >> 8);
        payload.push_back( 0x00 & 0xFF);
      }
      payload.push_back((~MODE_MASK) >> 8);
      payload.push_back((~MODE_MASK) & 0xFF);
      return true;
    lambda: |-
      if (data.size() < 4) return false;
      uint16_t mode = (data[2] << 8) | data[3];
      return (mode & 0x01) != 0;

# ----------- Climate ----------- #
climate:
  - platform:               wavinahc9000v2
    id:                     ${device}_climate_${channel_13_id}
    name:                   ${name} Comfort ${channel_13_friendly_name}
    current_temp_sensor_id: ${device}_comfort_temp_${channel_13_id}
    target_temp_number_id:  ${device}_comfort_target_temp_${channel_13_id}
    mode_switch_sensor_id:  ${device}_comfort_standby_${channel_13_id}
    action_sensor_id:       ${device}_output_${channel_13_id}
    visual:
      temperature_step:
        target_temperature: 0.5
        current_temperature: 0.1
